{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>404 — Page Not Found | AdaptLearn</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    :root{--bg:#080c14;--accent:#6c63ff;--accent2:#00d4ff;--text:#e8eaf6;--muted:#6b7280}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(108,99,255,.12) 0%,transparent 60%);pointer-events:none}
    .container{position:relative;z-index:1;padding:2rem}
    .code{font-family:'Syne',sans-serif;font-size:clamp(6rem,20vw,12rem);font-weight:800;line-height:1;background:linear-gradient(135deg,#6c63ff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:glitch 4s infinite}
    @keyframes glitch{0%,90%,100%{text-shadow:none}92%{text-shadow:3px 0 0 rgba(255,101,132,.8),-3px 0 0 rgba(0,212,255,.8)}94%{text-shadow:-3px 0 0 rgba(255,101,132,.8),3px 0 0 rgba(0,212,255,.8)}96%{text-shadow:none}}
    h1{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;margin:.5rem 0}
    p{color:var(--muted);font-size:1rem;margin-bottom:2rem;max-width:420px;margin-left:auto;margin-right:auto;line-height:1.7}
    .orbit{position:relative;width:200px;height:200px;margin:1.5rem auto}
    .planet{position:absolute;width:12px;height:12px;border-radius:50%;top:50%;left:50%;animation:orbit 3s linear infinite}
    .planet1{background:var(--accent);margin:-6px;animation-duration:2s}
    .planet2{background:var(--accent2);margin:-6px;animation-duration:3.5s;animation-delay:-.5s}
    .planet3{background:#ff6584;margin:-6px;animation-duration:5s;animation-delay:-1s}
    @keyframes orbit{from{transform:rotate(0deg) translateX(80px) rotate(0deg)}to{transform:rotate(360deg) translateX(80px) rotate(-360deg)}}
    .center-dot{position:absolute;width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;font-size:1.2rem}
    .btn{display:inline-flex;align-items:center;gap:.5rem;background:linear-gradient(135deg,var(--accent),#8b5cf6);border:none;color:#fff;padding:.7rem 1.8rem;border-radius:50px;font-size:.95rem;font-weight:600;cursor:pointer;text-decoration:none;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(108,99,255,.35);margin:.3rem}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(108,99,255,.55);color:#fff}
    .btn-outline{background:transparent;border:1.5px solid rgba(255,255,255,.2);box-shadow:none}
    .btn-outline:hover{border-color:var(--accent);box-shadow:none}
  </style>
</head>
<body>
  <div class="container">
    <div class="orbit">
      <div class="center-dot">🔍</div>
      <div class="planet planet1"></div>
      <div class="planet planet2"></div>
      <div class="planet planet3"></div>
    </div>
    <div class="code">404</div>
    <h1>Oops! We're Lost 🪐</h1>
    <p>Hey, don't worry! Even the best explorers take a wrong turn sometimes. The page you're looking for has either gone on a study break or was moved to a new learning path. Let's get you back on track!</p>
    <div>
      <a href="/" class="btn"><i class="fas fa-home"></i> Go Home</a>
      <a href="javascript:history.back()" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Go Back</a>
    </div>
  </div>
</body>
</html>
