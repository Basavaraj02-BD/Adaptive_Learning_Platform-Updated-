{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Password Reset Complete — AdaptLearn</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    :root{--bg:#080c14;--accent:#6c63ff;--accent2:#00d4ff;--text:#e8eaf6;--muted:#6b7280;--border:rgba(255,255,255,.08)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(108,99,255,.15) 0%,transparent 60%);pointer-events:none}
    .card{max-width:440px;width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:24px;padding:2.5rem;position:relative;z-index:10;backdrop-filter:blur(20px);text-align:center}
    .icon{width:72px;height:72px;background:linear-gradient(135deg,#00d4ff,#00f2fe);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 1.2rem}
    .brand{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,#6c63ff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1.5rem}
    h1{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:.4rem}
    p{color:var(--muted);font-size:.9rem;line-height:1.7;margin-bottom:1.5rem}
    .btn-submit{width:100%;padding:.85rem;background:linear-gradient(135deg,var(--accent),#8b5cf6);border:none;border-radius:12px;color:#fff;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 24px rgba(108,99,255,.4)}
    .btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(108,99,255,.6);color:#fff}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand"><i class="fas fa-brain me-1"></i>AdaptLearn</div>
    <div class="icon"><i class="fas fa-check" style="color:#fff"></i></div>
    <h1>Password Reset Complete</h1>
    <p>Your password has been set. You may go ahead and log in now.</p>
    <a href="{% url 'user_login' %}" class="btn-submit">
      Log in
    </a>
  </div>
</body>
</html>
