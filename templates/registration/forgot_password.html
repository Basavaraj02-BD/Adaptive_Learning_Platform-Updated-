{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Forgot Password — AdaptLearn</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    :root{--bg:#080c14;--accent:#6c63ff;--accent2:#00d4ff;--text:#e8eaf6;--muted:#6b7280;--border:rgba(255,255,255,.08)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(108,99,255,.15) 0%,transparent 60%);pointer-events:none}
    .card{max-width:440px;width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:24px;padding:2.5rem;position:relative;z-index:10;backdrop-filter:blur(20px);text-align:center}
    .icon{width:72px;height:72px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 1.2rem}
    .brand{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,#6c63ff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1.5rem}
    h1{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:.4rem}
    p{color:var(--muted);font-size:.9rem;line-height:1.7;margin-bottom:1.5rem}
    .glass-input{background:rgba(255,255,255,.05)!important;border:1.5px solid var(--border)!important;color:var(--text)!important;border-radius:12px!important;padding:.8rem 1rem .8rem 2.8rem!important;font-family:'DM Sans',sans-serif;transition:border-color .2s,box-shadow .2s;width:100%}
    .glass-input:focus{background:rgba(255,255,255,.08)!important;border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(108,99,255,.2)!important;outline:none}
    .glass-input::placeholder{color:var(--muted)!important}
    .input-wrap{position:relative;margin-bottom:1rem;text-align:left}
    .input-wrap i{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--muted)}
    .btn-submit{width:100%;padding:.85rem;background:linear-gradient(135deg,var(--accent),#8b5cf6);border:none;border-radius:12px;color:#fff;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 24px rgba(108,99,255,.4)}
    .btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(108,99,255,.6)}
    .link-accent{color:var(--accent);text-decoration:none;font-weight:600}
    .link-accent:hover{color:var(--accent2)}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand"><i class="fas fa-brain me-1"></i>AdaptLearn</div>
    <div class="icon"><i class="fas fa-key" style="color:#fff"></i></div>
    <h1>Forgot Password?</h1>
    <p>No worries! Enter your email address and we'll send you a link to reset your password.</p>
    {% if messages %}
    {% for msg in messages %}
    <div style="background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);border-radius:12px;padding:.8rem 1rem;color:var(--accent2);font-size:.88rem;margin-bottom:1rem;text-align:left">
      <i class="fas fa-info-circle me-2"></i>{{ msg }}
    </div>
    {% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="input-wrap">
        <i class="fas fa-envelope"></i>
        <input type="email" name="email" class="glass-input" placeholder="Your email address" required autocomplete="email">
      </div>
      <button type="submit" class="btn-submit">
        <i class="fas fa-paper-plane me-2"></i>Send Reset Link
      </button>
    </form>
    <div style="margin-top:1.5rem;font-size:.88rem;color:var(--muted)">
      Remember your password? <a href="{% url 'user_login' %}" class="link-accent">Sign in</a>
    </div>
  </div>
</body>
</html>
